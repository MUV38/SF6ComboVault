<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SF6 Combo Vault</title>
    <link rel="stylesheet" href="styles.css?v=20260510-8" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Street Fighter 6</p>
          <h1>Combo Vault</h1>
        </div>
        <nav class="page-nav" id="workflowNav" aria-label="ページ切り替え" hidden>
          <a class="nav-link" id="createPageLink" href="#create">
            <span>コンボ作成</span>
          </a>
          <a class="nav-link" id="libraryPageLink" href="#library">
            <span>保存済み</span>
          </a>
          <a class="nav-link" id="notesPageLink" href="#notes">
            <span>キャラメモ</span>
          </a>
          <a class="nav-link" id="practicePageLink" href="#practice">
            <span>練習</span>
          </a>
        </nav>
        <button class="text-button" id="changeCharacterButton" type="button" hidden>キャラ変更</button>
      </header>

      <main class="workspace single-page">
        <section class="page-view character-picker" id="characters" aria-labelledby="characters-title">
          <div class="panel-heading compact-heading">
            <div>
              <p class="eyebrow">Choose Fighter</p>
              <h2 id="characters-title">キャラ選択</h2>
            </div>
            <div class="heading-actions">
              <button class="ghost-button" id="exportVaultButton" type="button">保存データ共有</button>
              <button class="ghost-button" id="importVaultButton" type="button">読み込み</button>
              <button class="ghost-button" id="exportJsonButton" type="button">JSON書き出し</button>
              <button class="ghost-button" id="importJsonButton" type="button">JSON読み込み</button>
              <input id="importJsonInput" type="file" accept="application/json,.json" hidden />
            </div>
          </div>

          <div class="character-picker-body">
            <div class="character-grid" id="characterGrid"></div>
          </div>
        </section>

        <section class="page-view composer" id="create" aria-labelledby="composer-title" hidden>
          <div class="panel-heading compact-heading">
            <div>
              <p class="eyebrow">Recipe Builder</p>
              <h2 id="composer-title">コンボ作成</h2>
            </div>
            <div class="heading-actions">
              <span class="selected-character-pill current-character-label">未選択</span>
              <button class="icon-button" id="importSharedButton" type="button" title="共有URLから読み込み" aria-label="共有URLから読み込み">
                <span aria-hidden="true">↓</span>
              </button>
              <button class="icon-button favorite-toggle" id="favoriteInput" type="button" title="お気に入り" aria-label="お気に入り">
                <span aria-hidden="true">☆</span>
              </button>
            </div>
          </div>

          <form id="comboForm" class="combo-form">
            <input id="editingId" type="hidden" />

            <div class="field-grid">
              <label>
                <span>キャラ</span>
                <select id="characterInput" required disabled></select>
              </label>
              <label>
                <span>タイトル</span>
                <input id="titleInput" type="text" placeholder="例: 中央 2MP始動" required />
              </label>
            </div>

            <label>
              <span>タグ</span>
              <input id="tagsInput" type="text" placeholder="中央, ノーゲージ, SA3" />
            </label>

            <label>
              <span>メモ</span>
              <textarea id="notesInput" rows="3" placeholder="ダメージ、起き攻め、注意点など"></textarea>
            </label>

            <div class="recipe-strip" aria-live="polite">
              <div>
                <span class="strip-label">Recipe</span>
                <div id="recipePreview" class="recipe-preview empty">コマンドを選択</div>
              </div>
              <div class="recipe-actions">
                <button class="icon-button" id="undoStepButton" type="button" title="1つ戻す" aria-label="1つ戻す">↶</button>
                <button class="icon-button" id="clearRecipeButton" type="button" title="レシピを消す" aria-label="レシピを消す">×</button>
              </div>
            </div>

            <div class="command-bank">
              <div class="command-tabs" id="commandTabs"></div>
              <div class="command-buttons" id="commandButtons"></div>
            </div>

            <div class="form-actions">
              <button class="primary-button" type="submit">保存</button>
              <button class="ghost-button" id="cancelEditButton" type="button">編集解除</button>
              <button class="ghost-button" id="newComboButton" type="button">新規作成</button>
            </div>
          </form>
        </section>

        <section class="page-view library" id="library" aria-labelledby="library-title" hidden>
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Library</p>
              <h2 id="library-title">保存済みコンボ</h2>
            </div>
            <div class="heading-actions">
              <span class="selected-character-pill current-character-label">未選択</span>
              <span class="count-pill" id="comboCount">0</span>
            </div>
          </div>

          <div class="filters">
            <label class="search-field">
              <span>検索</span>
              <input id="searchInput" type="search" placeholder="キャラ・タグ・コマンドで検索" />
            </label>
            <div class="filter-row">
              <select id="characterFilter" hidden disabled></select>
              <button class="toggle-button" id="favoriteFilter" type="button" aria-pressed="false">★のみ</button>
            </div>
            <div class="tag-filter" id="tagFilter"></div>
          </div>

          <div class="combo-list" id="comboList"></div>
        </section>

        <section class="page-view notes" id="notes" aria-labelledby="notes-title" hidden>
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Character Notes</p>
              <h2 id="notes-title">キャラメモ</h2>
            </div>
            <span class="selected-character-pill current-character-label">未選択</span>
          </div>

          <form id="characterNoteForm" class="notes-form">
            <div class="field-grid">
              <label>
                <span>キャラ</span>
                <select id="noteCharacterInput" disabled></select>
              </label>
              <div class="note-summary" id="noteSummary"></div>
            </div>

            <div class="official-link-panel" id="officialLinkPanel" hidden></div>

            <div class="practice-dashboard" id="practiceDashboard"></div>

            <label>
              <span>メモ</span>
              <textarea id="characterNoteInput" rows="7" placeholder="対策、よく使う始動、セットプレイ、苦手ポイントなど"></textarea>
            </label>

            <div class="linked-combo-panel">
              <div class="linked-heading">
                <div>
                  <p class="eyebrow">Linked Combos</p>
                  <h3>リンクする保存済みコンボ</h3>
                </div>
              </div>
              <div class="linkable-combo-list" id="linkableComboList"></div>
            </div>

            <div class="form-actions">
              <button class="primary-button" type="submit">メモ保存</button>
            </div>
          </form>
        </section>

        <section class="page-view practice" id="practice" aria-labelledby="practice-title" hidden>
          <div class="panel-heading compact-heading">
            <div>
              <p class="eyebrow">Practice</p>
              <h2 id="practice-title">コンボ練習</h2>
            </div>
            <span class="selected-character-pill current-character-label">未選択</span>
          </div>

          <div class="practice-empty empty-state" id="practiceEmpty">保存済みコンボから練習を開始してください</div>

          <div class="practice-recommend-panel">
            <div class="linked-heading">
              <div>
                <p class="eyebrow">Today</p>
                <h3>今日の練習リスト</h3>
              </div>
            </div>
            <div class="practice-recommend-list" id="practiceRecommendList"></div>
          </div>

          <div class="practice-body" id="practiceBody" hidden>
            <div class="practice-hero">
              <div>
                <p class="character" id="practiceCharacter"></p>
                <h3 id="practiceTitle"></h3>
              </div>
              <div class="card-tags" id="practiceTags"></div>
            </div>

            <div class="practice-recipe card-recipe" id="practiceRecipe"></div>
            <p class="card-notes" id="practiceComboNotes"></p>

            <div class="practice-side-panel">
              <div class="practice-side-toggle" id="practiceSideToggle" role="tablist" aria-label="練習サイド">
                <button class="active" type="button" data-practice-side="p1" aria-selected="true">1P側</button>
                <button type="button" data-practice-side="p2" aria-selected="false">2P側</button>
              </div>
              <div class="practice-side-breakdown" id="practiceSideBreakdown"></div>
            </div>

            <div class="practice-stats">
              <div><span>成功率</span><strong id="practiceSuccessRate">0%</strong></div>
              <div><span>回数</span><strong id="practiceAttempts">0</strong></div>
              <div><span>最終練習</span><strong id="practiceLast">-</strong></div>
            </div>

            <label>
              <span>ステータス</span>
              <select id="practiceStatus">
                <option value="new">未練習</option>
                <option value="training">練習中</option>
                <option value="stable">安定</option>
                <option value="match">実戦投入</option>
              </select>
            </label>

            <label>
              <span>練習メモ</span>
              <textarea id="practiceNoteInput" rows="4" placeholder="失敗しやすい箇所、意識することなど"></textarea>
            </label>

            <label>
              <span>苦手ポイント</span>
              <textarea id="practiceWeakPointInput" rows="3" placeholder="例: DR後の中Pが遅れる、端限定で距離がズレる"></textarea>
            </label>

            <div class="form-actions">
              <button class="primary-button" id="practiceSuccessButton" type="button">成功</button>
              <button class="ghost-button" id="practiceFailureButton" type="button">失敗</button>
              <button class="ghost-button" id="practiceSaveButton" type="button">練習メモ保存</button>
              <button class="ghost-button" id="practiceBackButton" type="button">保存済みに戻る</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <template id="comboCardTemplate">
      <article class="combo-card">
        <div class="card-top">
          <div class="card-title-block">
            <p class="character"></p>
            <h3></h3>
          </div>
          <button class="icon-button favorite-card" type="button" title="お気に入り切替" aria-label="お気に入り切替"></button>
        </div>
        <div class="card-recipe"></div>
        <div class="card-tags"></div>
        <p class="card-notes"></p>
        <div class="card-actions">
          <button class="ghost-button practice-card" type="button">練習</button>
          <button class="ghost-button edit-card" type="button">編集</button>
          <button class="ghost-button share-card" type="button">共有</button>
          <button class="ghost-button copy-link-card" type="button">リンク</button>
          <button class="danger-button delete-card" type="button">削除</button>
        </div>
      </article>
    </template>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js?v=20260510-8"></script>
  </body>
</html>
